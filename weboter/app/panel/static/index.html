<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weboter 控制面板</title>
  <link rel="stylesheet" href="/panel/assets/panel.css" />
</head>
<body>
  <div class="layout">
    <aside class="aside card">
      <div>
        <button type="button" class="brand-menu" id="panelToggle" title="折叠/展开侧栏">
          <span class="menu-icon aside-toggle" id="panelToggleIcon">‹</span>
          <span class="menu-text">Weboter</span>
        </button>
        <div class="aside-divider"></div>
        <div class="menu">
          <button type="button" data-tab="overview" class="active"><span class="menu-icon">◍</span><span class="menu-text">运行总览</span></button>
          <button type="button" data-tab="tasks"><span class="menu-icon">▤</span><span class="menu-text">任务与会话</span></button>
          <button type="button" data-tab="env"><span class="menu-icon">⌁</span><span class="menu-text">Env 管理</span></button>
          <button type="button" data-tab="plugins"><span class="menu-icon">⬢</span><span class="menu-text">插件目录</span></button>
          <button type="button" data-tab="workflow"><span class="menu-icon">◧</span><span class="menu-text">Workflow 设计</span></button>
        </div>
      </div>

      <div class="aside-bottom">
        <button type="button" data-tab="user"><span class="menu-icon menu-avatar" id="menuUserAvatar">U</span><span class="menu-text">用户</span></button>
        <button type="button" data-tab="system"><span class="menu-icon">⚙</span><span class="menu-text">系统</span></button>
      </div>
    </aside>

    <main class="main">
      <section class="hero card">
        <div>
          <h1 id="workspaceTitle">运行总览</h1>
          <p id="workspaceDesc">查看服务状态、队列与最近执行信息。</p>
        </div>
        <div class="hero-actions">
          <button class="hero-icon-btn" id="topRefreshBtn" title="刷新当前页"></button>
          <button class="hero-icon-btn" id="autoRefreshBtn" title="自动刷新"></button>
        </div>
      </section>
      <div class="workspace-body">
        <section id="overview" class="section card active">
          <div class="grid" id="stats"></div>
        </section>

        <section id="tasks" class="section card">
          <div class="ops-layout">
            <aside class="ops-nav" id="opsNav"></aside>
            <section class="ops-detail" id="opsDetail"></section>
          </div>
        </section>

        <section id="env" class="section card">
          <div class="toolbar" style="margin-bottom:10px;">
            <button class="ghost" id="envRefreshBtn">刷新</button>
            <button class="primary" id="envNewBtn">＋ 新增变量</button>
          </div>
          <div class="env-add-form" id="envGlobalForm" style="margin-bottom:10px;border-radius:10px;border:1px solid var(--line);">
            <input id="envName" placeholder="变量名，例如 sms.api_key" />
            <input id="envValue" placeholder="变量值（字符串）" />
            <button class="primary" id="envSaveBtn">保存</button>
            <button class="ghost" id="envCancelBtn">取消</button>
          </div>
          <div id="envGroups" class="env-groups"></div>
        </section>

        <section id="plugins" class="section card">
          <div class="plugin-layout">
            <aside id="pluginTree" class="plugin-tree-panel"></aside>
            <section id="pluginDetail" class="plugin-detail-panel"></section>
          </div>
        </section>

        <section id="workflow" class="section card">
          <div class="placeholder">当前阶段先稳定管理与调试链路。workflow 图形化编辑区将在后续版本设计。</div>
        </section>

        <section id="user" class="section card">
          <div class="mini-grid">
            <div class="mini-card"><div class="mini-k">用户名</div><div class="mini-v" id="panelUser">-</div></div>
            <div class="mini-card"><div class="mini-k">账号状态</div><div class="mini-v" id="panelUserHint">-</div></div>
            <div class="mini-card"><div class="mini-k">会话</div><div class="mini-v">当前浏览器会话</div></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
            <button class="ghost" id="showLoginBtn">登录</button>
            <button class="danger" id="logoutBtn">退出登录</button>
          </div>
        </section>

        <section id="system" class="section card">
          <div class="mini-grid">
            <div class="mini-card"><div class="mini-k">Service</div><div class="mini-v" id="sysServiceStatus">-</div></div>
            <div class="mini-card"><div class="mini-k">任务队列</div><div class="mini-v" id="sysQueueStatus">-</div></div>
            <div class="mini-card"><div class="mini-k">会话数</div><div class="mini-v" id="sysSessionCount">-</div></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
            <button class="ghost" id="sysRefreshBtn">刷新系统信息</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="copyToast" class="copy-toast">已复制</div>

  <div class="login-mask" id="loginMask">
    <form class="login" id="loginForm">
      <h3>登录 Weboter 面板</h3>
      <p>单用户模式。若需要重置账号，请使用 CLI：weboter panel reset-auth</p>
      <label for="username">用户名</label>
      <input id="username" autocomplete="username" required />
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <div style="margin-top:12px; display:flex; justify-content:flex-end;">
        <button class="primary" type="submit">登录</button>
      </div>
      <div class="hint" id="loginHint"></div>
    </form>
  </div>

  <script src="/panel/assets/panel.js"></script>
</body>
</html>
